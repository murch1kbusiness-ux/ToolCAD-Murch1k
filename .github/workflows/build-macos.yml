name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Final/builds/macos-prep/app-source/package-lock.json

      - name: Install dependencies
        working-directory: Final/builds/macos-prep/app-source
        run: npm ci

      - name: Build app
        working-directory: Final/builds/macos-prep/app-source
        run: npm run build

      - name: Build unsigned macOS package
        working-directory: Final/builds/macos-prep/app-source
        run: npx electron-builder --mac dmg zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            Final/builds/macos-prep/app-source/dist/*.dmg
            Final/builds/macos-prep/app-source/dist/*.zip
          if-no-files-found: warn
