name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Final/builds/macos-prep/app-source/package-lock.json

      - name: Install dependencies
        working-directory: Final/builds/macos-prep/app-source
        run: npm ci

      - name: Build app
        working-directory: Final/builds/macos-prep/app-source
        run: npm run build

      - name: Build unsigned macOS package
        working-directory: Final/builds/macos-prep/app-source
        run: npx electron-builder --mac dmg zip --publish never

      - name: Debug release output
        run: |
          echo "=== release folder ==="
          ls -la Final/builds/macos-prep/app-source/release || true
          echo "=== find dmg/zip/app ==="
          find Final/builds/macos-prep/app-source/release -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.blockmap" \) || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            Final/builds/macos-prep/app-source/release/*.dmg
            Final/builds/macos-prep/app-source/release/*.zip
            Final/builds/macos-prep/app-source/release/*.blockmap
          if-no-files-found: error
